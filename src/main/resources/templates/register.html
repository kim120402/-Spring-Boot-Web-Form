<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Registration</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="registration-container">
    <h2>Course Registration Form</h2>
    <form th:action="@{/register}" th:object="${student}" method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter your full name">
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Enter your email">
        </div>
        <div>
            <label for="course">Course:</label>
            <input type="text" id="course" th:field="*{course}" placeholder="Enter course name">
        </div>
        <div>
            <label for="level">Level of Study:</label>
            <input type="text" id="level" th:field="*{level}" placeholder="Enter level (e.g., Undergraduate)">
        </div>
        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
